name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'PR title'
        required: false
        default: 'chore: promote staging to production'

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: promote staging to production'
          title: ${{ github.event.inputs.title }}
          body: |
            Automated promotion from staging to production.

            ⚠️ **Please review carefully before merging to production.**
            - Verify all staging tests passed
            - Confirm no regressions in staging
            - Check Vercel preview is stable

            Merge only when ready to deploy to production.
          branch: chore/promote-to-production
          base: production
          head: staging
          delete-branch: true
