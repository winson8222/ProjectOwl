name: Promote to Staging

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'PR title'
        required: false
        default: 'chore: promote master to staging'

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: promote master to staging'
          title: ${{ github.event.inputs.title }}
          body: |
            Automated promotion from master to staging.

            Please review the changes and merge to deploy to staging.
          branch: chore/promote-to-staging
          base: staging
          head: master
          delete-branch: true
