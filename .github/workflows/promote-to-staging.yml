name: Promote to Staging

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'PR title'
        required: false
        default: 'chore: promote master to staging'

permissions:
  contents: read
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create or reuse promotion PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --repo "${{ github.repository }}" --base staging --head master --state open --json url --jq '.[0].url // empty')
          if [ -n "$EXISTING" ]; then
            echo "A promotion PR is already open: $EXISTING"
            exit 0
          fi
          gh pr create \
            --repo "${{ github.repository }}" \
            --base staging \
            --head master \
            --title "${{ github.event.inputs.title }}" \
            --body "Automated promotion from master to staging.

          Please review the changes and merge to deploy to staging."
