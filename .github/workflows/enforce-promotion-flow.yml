name: Enforce Promotion Flow

on:
  pull_request:
    types: [opened, synchronize]
    branches: [staging, production]

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - name: Check promotion flow
        run: |
          BASE_BRANCH="${{ github.base_ref }}"
          HEAD_BRANCH="${{ github.head_ref }}"

          echo "PR: $HEAD_BRANCH → $BASE_BRANCH"

          # staging can only receive from master
          if [ "$BASE_BRANCH" = "staging" ]; then
            if [ "$HEAD_BRANCH" != "master" ] && [ "$HEAD_BRANCH" != "chore/promote-to-staging" ]; then
              echo "❌ PRs to 'staging' must come from 'master'"
              echo "   Found: $HEAD_BRANCH → staging"
              exit 1
            fi
            echo "✅ Valid: master → staging"
          fi

          # production can only receive from staging
          if [ "$BASE_BRANCH" = "production" ]; then
            if [ "$HEAD_BRANCH" != "staging" ] && [ "$HEAD_BRANCH" != "chore/promote-to-production" ]; then
              echo "❌ PRs to 'production' must come from 'staging'"
              echo "   Found: $HEAD_BRANCH → production"
              exit 1
            fi
            echo "✅ Valid: staging → production"
          fi
